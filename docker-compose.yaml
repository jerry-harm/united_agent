services:
  postgres:
    image: postgres:16
    container_name: united-agent-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: united_agent
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - ./postgres/data/db:/var/lib/postgresql/data
      - ./postgres/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d united_agent"]
      interval: 10s
      timeout: 5s
      retries: 5
